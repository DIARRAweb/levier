<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trésorerie</title>
<link rel="stylesheet" href="style.css">
<style>

body{
font-family:"Segoe UI",sans-serif;
background:linear-gradient(135deg,#ff9a00,#ff3d00);
min-height:100vh;
margin:0;
color:white;
}

header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.dashboard-box{
background:rgba(255,255,255,0.95);
color:#222;
width:90%;
max-width:450px;
margin:auto;
padding:25px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:12px;
border:none;
background:#f5f5f5;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
margin-top:12px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:linear-gradient(45deg,#ff9a00,#ff3d00);
color:white;
}

button:hover{
transform:scale(1.03);
transition:0.3s;
}

</style>

<style>

body{
margin:0;
font-family:"Segoe UI",sans-serif;
background:
linear-gradient(135deg,#ff512f,#ff9966,#ff3d00,#ff6a00);
background-size:600% 600%;
animation:bgMove 10s ease infinite;
min-height:100vh;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.dashboard-box{
width:92%;
max-width:500px;
margin:auto;
padding:20px;
}

.tax-card{
background:rgba(255,255,255,0.96);
color:#222;
padding:20px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
animation:fadeUp 0.5s ease;
}

.tax-header{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
color:#ff3d00;
}

.tax-card h3{
font-size:28px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#f3f3f3;
margin-top:8px;
margin-bottom:15px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
font-weight:bold;
font-size:15px;
margin-top:10px;
cursor:pointer;
background:
linear-gradient(45deg,#ff9a00,#ff3d00);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>
<body>

<header>
<h1>💰 Trésorerie Admin</h1>
</header>

<main>
<section class="dashboard-box">

<h2 style="text-align:center;margin-bottom:25px;">
💰 Gestion Trésorerie
</h2>

<!-- ========================= -->
<!-- 🔥 TAXE NATIONALE -->
<!-- ========================= -->

<div class="tax-card">

<div class="tax-header">
🌍 Commission nationale
</div>

<h3 id="nationalBalance">
0 FCFA
</h3>

<label>Nom</label>
<input id="nationalName" type="text">

<label>Taux (%)</label>
<input id="nationalRate" type="number">

<button onclick="saveNational()">
💾 Enregistrer
</button>

<button onclick="sendNationalFees()">
📤 Envoyer au service
</button>

</div>

<!-- ========================= -->
<!-- 🌎 TAXE INTERNATIONALE -->
<!-- ========================= -->

<div class="tax-card">

<div class="tax-header">
🌎 Commission internationale
</div>

<h3 id="internationalBalance">
0 FCFA
</h3>

<label>Nom</label>
<input id="internationalName" type="text">

<label>Taux (%)</label>
<input id="internationalRate" type="number">

<button onclick="saveInternational()">
💾 Enregistrer
</button>

<button onclick="sendInternationalFees()">
📤 Envoyer au service
</button>

</div>

<!-- ========================= -->
<!-- 🏛 TAXE ETAT -->
<!-- ========================= -->

<div class="tax-card">

<div class="tax-header">
🏛 Fonds de soutien
</div>

<h3 id="startupBalance">
0 FCFA
</h3>

<label>Nom</label>
<input id="startupName" type="text">

<label>Taux (%)</label>
<input id="startupRate" type="number">

<button onclick="saveStartup()">
💾 Enregistrer
</button>

<button onclick="sendStartupFees()">
📤 Envoyer à l'État
</button>

</div>

<button onclick="goBack()">
⬅ Retour
</button>

</section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB2cVumUWZ_cDUC-kd7FUpUaXEODB1CCNE",
    authDomain: "ma-money5.firebaseapp.com",
    projectId: "ma-money5",
    storageBucket: "ma-money5.firebasestorage.app",
    messagingSenderId: "730105139852",
    appId: "1:730105139852:web:0dbdca815a359a7b0d61a9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

async function load(){

const snap = await get(ref(db,"treasury"));

let t = snap.val() || {

national:{
name:"Commission nationale",
rate:0.01,
balance:0
},

international:{
name:"Commission internationale",
rate:0.015,
balance:0
},

startup:{
name:"Fonds soutien digital",
rate:0.005,
balance:0
}

};

/* 🔥 SOLDES */

nationalBalance.innerText =
Number(t.national.balance || 0).toLocaleString()
+ " FCFA";

internationalBalance.innerText =
Number(t.international.balance || 0).toLocaleString()
+ " FCFA";

startupBalance.innerText =
Number(t.startup.balance || 0).toLocaleString()
+ " FCFA";

/* 🔥 NOMS */

nationalName.value = t.national.name;
internationalName.value = t.international.name;
startupName.value = t.startup.name;

/* 🔥 TAUX */

nationalRate.value =
(t.national.rate || 0) * 100;

internationalRate.value =
(t.international.rate || 0) * 100;

startupRate.value =
(t.startup.rate || 0) * 100;

}
load();

/* =========================
💾 SAVE NATIONAL
========================= */

window.saveNational = async function(){

await update(ref(db,"treasury/national"),{

name:nationalName.value,

rate:
parseFloat(nationalRate.value || 0)/100

});

alert("✅ Taxe nationale mise à jour");

load();

};

/* =========================
💾 SAVE INTERNATIONAL
========================= */

window.saveInternational = async function(){

await update(ref(db,"treasury/international"),{

name:internationalName.value,

rate:
parseFloat(internationalRate.value || 0)/100

});

alert("✅ Taxe internationale mise à jour");

load();

};

/* =========================
💾 SAVE STARTUP
========================= */

window.saveStartup = async function(){

await update(ref(db,"treasury/startup"),{

name:startupName.value,

rate:
parseFloat(startupRate.value || 0)/100

});

alert("✅ Fonds soutien mis à jour");

load();

};

/* =========================
💾 SAVE NATIONAL
========================= */

window.saveNational = async function(){

await update(ref(db,"treasury/national"),{

name:nationalName.value,

rate:
parseFloat(nationalRate.value || 0)/100

});

alert("✅ Taxe nationale mise à jour");

load();

};

/* =========================
💾 SAVE INTERNATIONAL
========================= */

window.saveInternational = async function(){

await update(ref(db,"treasury/international"),{

name:internationalName.value,

rate:
parseFloat(internationalRate.value || 0)/100

});

alert("✅ Taxe internationale mise à jour");

load();

};

/* =========================
💾 SAVE STARTUP
========================= */

window.saveStartup = async function(){

await update(ref(db,"treasury/startup"),{

name:startupName.value,

rate:
parseFloat(startupRate.value || 0)/100

});

alert("✅ Fonds soutien mis à jour");

load();

};

window.updateRates = async function(){

await update(ref(db,"treasury"),{

/* 🔥 TAXE NATIONALE */
nationalTaxName:
nationalName.value,

nationalRate:
parseFloat(nationalRate.value || 0) / 100,

/* 🔥 TAXE INTERNATIONALE */
internationalTaxName:
internationalName.value,

internationalRate:
parseFloat(internationalRate.value || 0) / 100,

/* 🔥 TAXE STARTUP */
startupTaxName:
startupName.value,

startupRate:
parseFloat(startupRate.value || 0) / 100

});

alert("✅ Taxes mises à jour");

load();

};

window.sendFees = async function(){
const treasurySnap = await get(ref(db,"treasury"));
const adminSnap = await get(ref(db,"users/99999999"));

let t = treasurySnap.val();
let admin = adminSnap.val();

admin.solde += t.balance;
t.balance = 0;

await update(ref(db,"users/99999999"), admin);
await update(ref(db,"treasury"), t);

alert("✅ Trésorerie envoyée à l'admin !");
load();
};

window.goBack = function(){
window.location.href = "admin.html";
};
</script>

</body>
</html>
