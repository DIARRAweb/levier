<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trésorerie</title>
<link rel="stylesheet" href="style.css">
<style>


header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.dashboard-box{
background:rgba(255,255,255,0.95);
color:#222;
width:90%;
max-width:450px;
margin:auto;
padding:25px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border-radius:12px;
border:none;
background:#f5f5f5;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
margin-top:12px;
font-weight:bold;
font-size:15px;
cursor:pointer;
background:linear-gradient(45deg,#ff9a00,#ff3d00);
color:white;
}

button:hover{
transform:scale(1.03);
transition:0.3s;
}

</style>

<style>

body{
margin:0;
font-family:"Segoe UI",sans-serif;

background:
linear-gradient(
135deg,
#0f0f0f,
#1c1c1c,
#2b2b2b,
#111
);

background-size:400% 400%;
animation:bgMove 15s ease infinite;

min-height:100vh;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.dashboard-box{
width:92%;
max-width:500px;
margin:auto;
padding:20px;
}

.tax-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.08);
color:#222;
padding:20px;
border-radius:25px;
margin-bottom:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
animation:fadeUp 0.5s ease;
}

.tax-header{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
color:#ff3d00;
}

.tax-card h3{
font-size:28px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#f3f3f3;
margin-top:8px;
margin-bottom:15px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
font-weight:bold;
font-size:15px;
margin-top:10px;
cursor:pointer;
background:
linear-gradient(45deg,#ff9a00,#ff3d00);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.topbar{
position:sticky;
top:0;
z-index:999;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 25px;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
font-size:24px;
font-weight:bold;
color:white;
}

.top-title{
font-size:20px;
font-weight:bold;
color:white;
}

</style>
</head>
<body>

<header class="topbar">
<div class="logo">
💎 MaliPay
</div>

<div class="top-title">
💰 Trésorerie Admin
</div>
</header>

<main>
<section class="dashboard-box">

<h2 style="text-align:center;margin-bottom:25px;">
💰 Gestion Trésorerie
</h2>

<!-- ========================= -->
<!-- 🔥 TAXE NATIONALE -->
<!-- ========================= -->

<div class="tax-card">

<div class="tax-header">
🌍 Commission nationale
</div>

<h3 id="nationalBalance">
0 FCFA
</h3>

<label>Nom</label>
<input id="nationalName" type="text">

<label>Taux (%)</label>
<input id="nationalRate" type="number">

<button onclick="saveNational()">
💾 Enregistrer
</button>

<button onclick="sendNationalFees()">
📤 Envoyer au service
</button>

</div>

<!-- ========================= -->
<!-- 🌎 TAXE INTERNATIONALE -->
<!-- ========================= -->

<div class="tax-card">

<div class="tax-header">
🌎 Commission internationale
</div>

<h3 id="internationalBalance">
0 FCFA
</h3>

<label>Nom</label>
<input id="internationalName" type="text">

<label>Taux (%)</label>
<input id="internationalRate" type="number">

<button onclick="saveInternational()">
💾 Enregistrer
</button>

<button onclick="sendInternationalFees()">
📤 Envoyer au service
</button>

</div>

<!-- ========================= -->
<!-- 🏛 TAXE ETAT -->
<!-- ========================= -->

<div class="tax-card">

<div class="tax-header">
🏛 Fonds de soutien
</div>

<h3 id="startupBalance">
0 FCFA
</h3>

<label>Nom</label>
<input id="startupName" type="text">

<label>Taux (%)</label>
<input id="startupRate" type="number">

<button onclick="saveStartup()">
💾 Enregistrer
</button>

<button onclick="sendStartupFees()">
📤 Envoyer à l'État
</button>

</div>

<button onclick="goBack()">
⬅ Retour
</button>

</section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, get, update, onValue  } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB2cVumUWZ_cDUC-kd7FUpUaXEODB1CCNE",
    authDomain: "ma-money5.firebaseapp.com",
    projectId: "ma-money5",
    storageBucket: "ma-money5.firebasestorage.app",
    messagingSenderId: "730105139852",
    appId: "1:730105139852:web:0dbdca815a359a7b0d61a9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function load(){

onValue(ref(db,"treasury"),(snap)=>{

let t = snap.val() || {

national:{
name:"Commission nationale",
rate:0.01,
balance:0
},

international:{
name:"Commission internationale",
rate:0.015,
balance:0
},

startup:{
name:"Fonds soutien digital",
rate:0.005,
balance:0
}

};

nationalBalance.innerText =
Number(t.national.balance || 0)
.toLocaleString() + " FCFA";

internationalBalance.innerText =
Number(t.international.balance || 0)
.toLocaleString() + " FCFA";

startupBalance.innerText =
Number(t.startup.balance || 0)
.toLocaleString() + " FCFA";

nationalName.value =
t.national.name;

internationalName.value =
t.international.name;

startupName.value =
t.startup.name;

nationalRate.value =
(t.national.rate || 0) * 100;

internationalRate.value =
(t.international.rate || 0) * 100;

startupRate.value =
(t.startup.rate || 0) * 100;

});

}
load();

/* =========================
💾 SAVE NATIONAL
========================= */

window.saveNational = async function(){

await update(ref(db,"treasury/national"),{

name:nationalName.value,

rate:
parseFloat(nationalRate.value || 0)/100

});

alert("✅ Taxe nationale mise à jour");

load();

};

/* =========================
💾 SAVE INTERNATIONAL
========================= */

window.saveInternational = async function(){

await update(ref(db,"treasury/international"),{

name:internationalName.value,

rate:
parseFloat(internationalRate.value || 0)/100

});

alert("✅ Taxe internationale mise à jour");

load();

};

/* =========================
💾 SAVE STARTUP
========================= */

window.saveStartup = async function(){

await update(ref(db,"treasury/startup"),{

name:startupName.value,

rate:
parseFloat(startupRate.value || 0)/100

});

alert("✅ Fonds soutien mis à jour");

load();

};

/* =========================
💾 SAVE NATIONAL
========================= */

window.saveNational = async function(){

await update(ref(db,"treasury/national"),{

name:nationalName.value,

rate:
parseFloat(nationalRate.value || 0)/100

});

alert("✅ Taxe nationale mise à jour");

load();

};

/* =========================
💾 SAVE INTERNATIONAL
========================= */

window.saveInternational = async function(){

await update(ref(db,"treasury/international"),{

name:internationalName.value,

rate:
parseFloat(internationalRate.value || 0)/100

});

alert("✅ Taxe internationale mise à jour");

load();

};

/* =========================
💾 SAVE STARTUP
========================= */

window.saveStartup = async function(){

await update(ref(db,"treasury/startup"),{

name:startupName.value,

rate:
parseFloat(startupRate.value || 0)/100

});

alert("✅ Fonds soutien mis à jour");

load();

};

window.updateRates = async function(){

await update(ref(db,"treasury"),{

/* 🔥 TAXE NATIONALE */
nationalTaxName:
nationalName.value,

nationalRate:
parseFloat(nationalRate.value || 0) / 100,

/* 🔥 TAXE INTERNATIONALE */
internationalTaxName:
internationalName.value,

internationalRate:
parseFloat(internationalRate.value || 0) / 100,

/* 🔥 TAXE STARTUP */
startupTaxName:
startupName.value,

startupRate:
parseFloat(startupRate.value || 0) / 100

});

alert("✅ Taxes mises à jour");

load();

};

/* =========================
📤 ENVOYER COMMISSION NATIONALE
========================= */

window.sendNationalFees = async function(){

const treasurySnap =
await get(ref(db,"treasury"));

const adminSnap =
await get(ref(db,"users/+22399999999"));

if(!treasurySnap.exists() || !adminSnap.exists()){
alert("❌ Données introuvables");
return;
}

let treasury = treasurySnap.val();
let admin = adminSnap.val();

let amount =
Number(treasury.national?.balance || 0);

if(amount <= 0){
alert("❌ Aucun frais national");
return;
}

/* 🔥 crédit admin */
admin.solde =
Number(admin.solde || 0) + amount;

/* 🔥 reset */
treasury.national.balance = 0;

/* 🔥 sauvegarde */
await update(
ref(db,"users/+22399999999"),
{
solde: admin.solde
}
);

await update(
ref(db,"treasury/national"),
{
balance:0
}
);

alert("✅ Frais nationaux envoyés");

load();

};

/* =========================
📤 ENVOYER COMMISSION INTERNATIONALE
========================= */

window.sendInternationalFees = async function(){

const treasurySnap =
await get(ref(db,"treasury"));

const adminSnap =
await get(ref(db,"users/+22399999999"));

if(!treasurySnap.exists() || !adminSnap.exists()){
alert("❌ Données introuvables");
return;
}

let treasury = treasurySnap.val();
let admin = adminSnap.val();

let amount =
Number(treasury.international?.balance || 0);

if(amount <= 0){
alert("❌ Aucun frais international");
return;
}

/* 🔥 crédit admin */
admin.solde =
Number(admin.solde || 0) + amount;

/* 🔥 reset */
treasury.international.balance = 0;

/* 🔥 sauvegarde */
await update(
ref(db,"users/+22399999999"),
{
solde: admin.solde
}
);

await update(
ref(db,"treasury/international"),
{
balance:0
}
);

alert("✅ Frais internationaux envoyés");

load();

};

/* =========================
📤 ENVOYER FONDS ETAT
========================= */

window.sendStartupFees = async function(){

const treasurySnap =
await get(ref(db,"treasury"));

const stateSnap =
await get(ref(db,"users/+22375757575"));

if(!treasurySnap.exists() || !stateSnap.exists()){
alert("❌ Données introuvables");
return;
}

let treasury = treasurySnap.val();
let state = stateSnap.val();

let amount =
Number(treasury.startup?.balance || 0);

if(amount <= 0){
alert("❌ Aucun fonds disponible");
return;
}

/* 🔥 crédit Etat */
state.solde =
Number(state.solde || 0) + amount;

/* 🔥 reset */
treasury.startup.balance = 0;

/* 🔥 sauvegarde */
await update(
ref(db,"users/+22375757575"),
{
solde: state.solde
}
);

await update(
ref(db,"treasury/startup"),
{
balance:0
}
);

alert("✅ Fonds envoyés à l'Etat");

load();

};

window.goBack = function(){
window.location.href = "admin.html";
};
</script>

</body>
</html>
