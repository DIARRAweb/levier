<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Ma Money</title>
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/css/intlTelInput.css"/>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/intlTelInput.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/utils.js"></script>

<style>
body { background: black !important; }

.hero-wall {
position: fixed;
inset: 0;
z-index: -2;
overflow: hidden;
}

.hero-wall video,
.hero-wall img {
width: 100%;
height: 100%;
object-fit: cover;
filter: brightness(0.35);
}

.overlay-dark {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.45);
z-index: -1;
}

main {
display: flex;
justify-content: center;
}

.login-card {
background: rgba(255,255,255,0.97);
backdrop-filter: blur(14px);
padding: 30px;
border-radius: 20px;
box-shadow: 0 15px 50px rgba(0,0,0,0.25);
max-width: 380px;
width: 100%;
animation: fadeIn 0.9s ease;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(35px); }
to { opacity: 1; transform: translateY(0); }
}

.country-display {
margin-top: 8px;
font-size: 14px;
font-weight: 500;
color: #444;
}

.error {
color: red;
margin-top: 10px;
font-weight: 500;
}

button {
margin-top: 15px;
}

footer {
text-align: center;
padding: 18px;
color: white;
background: rgba(0,0,0,0.6);
font-size: 14px;
}
</style>
</head>

<body>

<header>
<h1>🔐 Ma Money — Connexion</h1>
</header>

<div class="hero-wall">
<video id="bgVideo" autoplay muted loop playsinline></video>
<img id="bgImage" hidden>
</div>

<div class="overlay-dark"></div>

<main>
<section class="login-card">

<h2>Connexion sécurisée</h2>

<form id="loginForm">

<label>📱 Numéro</label>
<input type="tel" id="phone" placeholder="Ex: +22370000000 ou 70 00 00 00" required>
<div id="countryInfo" class="country-display"></div>

<label>🔑 Mot de passe</label>
<input type="password" id="password" placeholder="Mot de passe" required>

<button type="submit">Se connecter</button>

</form>

<p id="error" class="error"></p>

</section>
</main>

<footer>
<strong>Ma Money 🇲🇱</strong> — Paiement numérique sécurisé<br>
🔒 Transactions cryptées • Données protégées<br>
✨ <em>"Votre argent en sécurité, votre avenir en confiance."</em>
</footer>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyB2cVumUWZ_cDUC-kd7FUpUaXEODB1CCNE",
    authDomain: "ma-money5.firebaseapp.com",
    databaseURL: "https://ma-money5-default-rtdb.firebaseio.com",
    projectId: "ma-money5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* INTL TEL INPUT */

const phoneInput = document.querySelector("#phone");
const countryInfo = document.getElementById("countryInfo");

const iti = window.intlTelInput(phoneInput, {
initialCountry: "ml",
nationalMode: false,
autoHideDialCode: false,
preferredCountries: ["ml","ci","sn","gh","fr"],
separateDialCode: false,
utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.1.1/build/js/utils.js"
});

function updateCountryDisplay() {
const countryData = iti.getSelectedCountryData();
if(countryData){
countryInfo.innerText =
"🌍 Pays détecté : " +
countryData.name +
" " +
getFlagEmoji(countryData.iso2);
}
}

function getFlagEmoji(code){
return code
.toUpperCase()
.replace(/./g, char =>
String.fromCodePoint(127397 + char.charCodeAt())
);
}

phoneInput.addEventListener("input", () => {
if(phoneInput.value.startsWith("+")){
iti.setNumber(phoneInput.value);
}
updateCountryDisplay();
});

phoneInput.addEventListener("countrychange", updateCountryDisplay);
updateCountryDisplay();

/* LOAD BACKGROUND */

async function loadAds(){
try{
const snap = await get(ref(db,"ads"));
const data = snap.val() || {};
const video = document.getElementById("bgVideo");
const image = document.getElementById("bgImage");

if(data.type === "video"){
video.src = data.url;
video.hidden = false;
image.hidden = true;
} else if(data.url){
image.src = data.url;
image.hidden = false;
video.hidden = true;
}
}catch{}
}
loadAds();

/* LOGIN SYSTEM */

document.getElementById("loginForm").addEventListener("submit", async (e)=>{
e.preventDefault();

const error = document.getElementById("error");
error.innerText = "";

if(!iti.isValidNumber()){
error.innerText = "❌ Numéro invalide";
return;
}

const phone = iti.getNumber();
const password = document.getElementById("password").value.trim();

try {

const adminPhone = "+22399999999";
const adminRef = ref(db, "users/" + adminPhone);

/* ADMIN UNIQUE MODE */
if(phone === adminPhone && password === "admin123"){
const adminSnap = await get(adminRef);

if(!adminSnap.exists()){
await set(adminRef, {
phone: adminPhone,
password: "admin123",
name: "Administrateur",
solde: 1000000,
role: "admin",
frozen: false
});
}

const finalAdminSnap = await get(adminRef);
const adminUser = finalAdminSnap.val();

localStorage.setItem("loggedUser", JSON.stringify(adminUser));
window.location.href = "admin.html";
return;
}

/* =========================
👤 UTILISATEUR OU AGENT
========================= */

/* 1️⃣ Vérifier USER */
const userRef = ref(db, "users/" + phone);
const userSnap = await get(userRef);

if(userSnap.exists()){
const user = userSnap.val();

if(user.password !== password){
error.innerText = "❌ Mot de passe incorrect";
return;
}

localStorage.setItem("loggedUser", JSON.stringify(user));

window.location.href =
user.role === "admin"
? "admin.html"
: "dashboard.html";

return;
}

/* 2️⃣ Vérifier AGENT */
const agentRef = ref(db, "agents/" + phone);
const agentSnap = await get(agentRef);

if(agentSnap.exists()){
const agent = agentSnap.val();

if(agent.password !== password){
error.innerText = "❌ Mot de passe incorrect";
return;
}

localStorage.setItem("loggedAgent", JSON.stringify(agent));

window.location.href = "agent.html";
return;
}

/* 3️⃣ Aucun trouvé */
error.innerText = "❌ Compte introuvable";

} catch {
error.innerText = "❌ Erreur Firebase";
}

});

</script>

</body>
</html>
